<!DOCTYPE html>
<html lang="en">
<meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-eval' https://cdnjs.cloudflare.com https://fonts.googleapis.com https://fonts.gstatic.com;">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pan-Himalayan Airlines — Live Fleet Map</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Marcellus+SC&family=Alegreya+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --zanskar:   #5c158a;
      --lilac:     #BFA2DC;
      --marigold:  #F7B500;
      --turquoise: #269473;
      --red:       #D91E36;
      --mist:      #c7c9d3;
      --black:     #000000;
      --copper:    #B87333;
      --juniper:   #4B5D43;
      --rose:      #8a345f;
      --bg:        #000000;
      --bg2:       #000000;
      --bg3:       #0a0208;       
      --border:    #2a1a3a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Alegreya Sans', sans-serif;
      background: var(--bg);
      color: var(--mist);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top bar ── */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 52px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 1000;
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 12px;
    }

    .brand-name {
      font-family: 'Marcellus SC', serif;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: var(--mist);
    }
   .brand-name {
      color: var(--mist);
    }
    .brand-name em {
    color: var(--mist);
    }

    .brand-sub {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--lilac);
      font-family: 'Marcellus SC', serif;
    }

    #clock-block {
      display: flex;
      gap: 28px;
    }

    .tz {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }

    .tz .label {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--lilac);
    }

    .tz .time {
      font-size: 15px;
      font-weight: 600;
      color: var(--mist);
      font-variant-numeric: tabular-nums;
      letter-spacing: 1px;
    }

    #fleet-count {
      font-size: 12px;
      color: #444;
      letter-spacing: 1px;
    }

    /* ── Main layout ── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Map ── */
    #map {
      flex: 1;
      background: var(--bg);
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 290px;
      background: var(--bg2);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    .sidebar-header {
      font-family: 'Marcellus SC', serif;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--zanskar);
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
    }

    #fleet-list {
      overflow-y: auto;
      flex: 1;
      padding: 6px 0;
    }

    #fleet-list::-webkit-scrollbar { width: 4px; }
    #fleet-list::-webkit-scrollbar-track { background: var(--bg2); }
    #fleet-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .fleet-item {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .fleet-item:hover { background: var(--bg3); }

    .fleet-item-left {}

    .fleet-reg {
      font-family: 'Marcellus SC', serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--mist);
      letter-spacing: 1px;
    }

    .fleet-type {
      font-size: 11px;
      color: #554466;
      margin-top: 2px;
      letter-spacing: 0.3px;
    }

    .fleet-base {
      font-size: 11px;
      color: var(--lilac);
      margin-top: 2px;
      opacity: 0.7;
    }

    .fleet-status {
      font-size: 9px;
      padding: 2px 7px;
      border-radius: 2px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 2px;
      white-space: nowrap;
    }

    .status-online      { background: #0a2a0a; color: var(--turquoise); border: 1px solid #1a4a1a; }
    .status-maintenance { background: #2a0a0a; color: var(--red);       border: 1px solid #4a1a1a; }
    .status-waiting     { background: #2a1a00; color: var(--marigold);  border: 1px solid #4a3a00; }
    .status-delivered   { background: #1a0a2a; color: var(--lilac);     border: 1px solid #2a1a3a; }

    /* ── Leaflet overrides ── */
    .leaflet-container { background: var(--bg); }

    .leaflet-tile {
      filter: brightness(0.45) saturate(0.3) hue-rotate(210deg);
    }

    .leaflet-control-zoom a {
      background: var(--bg2) !important;
      color: var(--mist) !important;
      border-color: var(--border) !important;
      font-family: 'Cormorant Garamond', serif !important;
    }

    .leaflet-control-zoom a:hover {
      background: var(--bg3) !important;
    }

    .leaflet-control-attribution {
      background: rgba(10,2,8,0.85) !important;
      color: #333 !important;
      font-size: 9px !important;
    }

    .leaflet-control-attribution a { color: #444 !important; }

    .leaflet-popup-content-wrapper {
      background: var(--bg2) !important;
      color: var(--mist) !important;
      border: 1px solid var(--border) !important;
      border-radius: 4px !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6) !important;
      font-family: 'Cormorant Garamond', serif !important;
    }

    .leaflet-popup-tip {
      background: var(--bg2) !important;
    }

    .leaflet-popup-content {
      font-size: 13px;
      line-height: 1.6;
      margin: 10px 14px !important;
    }

    .popup-iata {
      font-family: 'Marcellus SC', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--lilac);
      letter-spacing: 1px;
    }

    .popup-name {
      font-size: 12px;
      color: var(--mist);
      margin-top: 1px;
    }

    .popup-icao {
      font-size: 10px;
      color: #554466;
      letter-spacing: 1px;
      margin-top: 2px;
    }

    /* Loading overlay */
    #loading {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      gap: 20px;
    }

    #loading .logo {
      font-family: 'Marcellus SC', serif;
      font-size: 26px;
      font-weight: 600;
      color: var(--mist);
      letter-spacing: 2px;
    }

    #loading .logo em {
      color: var(--mist);
      font-style: normal;
    }

    #loading .tagline {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--lilac);
    }

    #loading .spinner {
      width: 36px;
      height: 36px;
      border: 2px solid var(--border);
      border-top-color: var(--zanskar);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    #loading .msg {
      font-size: 12px;
      color: #443355;
      letter-spacing: 1px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

<script>
// ─────────────────────────────────────────────
// POSITION ENGINE
// ─────────────────────────────────────────────

// Haversine distance in nautical miles
function haversineNmi(lat1, lon1, lat2, lon2) {
  const R    = 3440.065; // Earth radius in nmi
  const phi1 = lat1 * Math.PI/180;
  const phi2 = lat2 * Math.PI/180;
  const dphi = (lat2-lat1) * Math.PI/180;
  const dlam = (lon2-lon1) * Math.PI/180;
  const a    = Math.sin(dphi/2)**2 + Math.cos(phi1)*Math.cos(phi2)*Math.sin(dlam/2)**2;
  const c    = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

// Interpolate position along great circle (t = 0 to 1)
function greatCircleInterp(lat1, lon1, lat2, lon2, t) {
  const toRad = d => d * Math.PI/180;
  const toDeg = r => r * 180/Math.PI;
  const φ1 = toRad(lat1), λ1 = toRad(lon1);
  const φ2 = toRad(lat2), λ2 = toRad(lon2);
  const d  = 2 * Math.asin(Math.sqrt(
    Math.sin((φ2-φ1)/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin((λ2-λ1)/2)**2
  ));
  if (d < 1e-10) return { lat: lat1, lon: lon1 };
  const A  = Math.sin((1-t)*d) / Math.sin(d);
  const B  = Math.sin(t*d)     / Math.sin(d);
  const x  = A*Math.cos(φ1)*Math.cos(λ1) + B*Math.cos(φ2)*Math.cos(λ2);
  const y  = A*Math.cos(φ1)*Math.sin(λ1) + B*Math.cos(φ2)*Math.sin(λ2);
  const z  = A*Math.sin(φ1)              + B*Math.sin(φ2);
  return {
    lat: toDeg(Math.atan2(z, Math.sqrt(x*x + y*y))),
    lon: toDeg(Math.atan2(y, x)),
  };
}

// Bearing from point 1 to point 2 (degrees)
function bearing(lat1, lon1, lat2, lon2) {
  const toRad = d => d * Math.PI/180;
  const φ1 = toRad(lat1), φ2 = toRad(lat2);
  const Δλ = toRad(lon2 - lon1);
  const y  = Math.sin(Δλ) * Math.cos(φ2);
  const x  = Math.cos(φ1)*Math.sin(φ2) - Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ);
  return (Math.atan2(y, x) * 180/Math.PI + 360) % 360;
}

// Parse "hh:mm" or "hh:mm:ss" duration string to hours (handles >24h)
function parseDuration(str) {
  if (!str) return 0;
  const parts = String(str).split(':').map(Number);
  return parts[0] + (parts[1]||0)/60 + (parts[2]||0)/3600;
}

// Parse "hh:mm" time string to fractional hours since midnight
function parseTime(str) {
  if (!str) return 6; // default 06:00
  const parts = String(str).split(':').map(Number);
  return parts[0] + (parts[1]||0)/60;
}

// Map aircraft type string to column group key
function getAircraftGroup(typeStr) {
  if (!typeStr) return null;
  const t = typeStr.toLowerCase();
  if (t.includes('a320neo') || t.includes('a20n')) return 'A20N';
  if (t.includes('a320'))                           return 'A320';
  if (t.includes('a319neo') || t.includes('a19n')) return 'A19N';
  if (t.includes('a319'))                           return 'A319';
  if (t.includes('atr') || t.includes('at46'))     return 'AT46';
  return null;
}

// Days of week mapping (JS getDay: 0=Sun,1=Mon,...,6=Sat)
const DAY_COLS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
// Maps to schedule columns D-J (index 0=Mon...6=Sun in the sheet)
const SHEET_DAY_ORDER = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

// Given current UTC time, compute position of one aircraft
// Returns { lat, lon, bearing, status, fromIATA, toIATA, depTime, arrTime, legProgress }
function computePosition(ac, route, airports, nowUTC) {
  const hubICAO  = ac.homeBase;
  const tzOffset = HUB_TZ[hubICAO] || 345; // minutes from UTC
  const nowLocal = new Date(nowUTC.getTime() + tzOffset * 60000);

  // Current local time in fractional hours since midnight
  const localHrs = nowLocal.getUTCHours() + nowLocal.getUTCMinutes()/60 + nowLocal.getUTCSeconds()/3600;

  // Day of week in local time (SHEET_DAY_ORDER index 0=Mon)
  const jsDow    = nowLocal.getUTCDay(); // 0=Sun
  const sheetDow = jsDow === 0 ? 6 : jsDow - 1; // 0=Mon...6=Sun

  // Get today's destination sequence
  const destStr  = ac.schedule[sheetDow];
  if (!destStr) return { status: 'ground', lat: null, lon: null, hubICAO };

  // Parse destinations
  const dests    = destStr.split(',').map(s => s.trim()).filter(Boolean);
  if (!dests.length) return { status: 'ground', lat: null, lon: null, hubICAO };

  // Start time in local fractional hours
  const startHrs = route.startTime !== null ? route.startTime : 6.0;

  // Speed in kts, turnaround in hours
  const speedKts    = ac.speed || 447;
  const turnaround  = parseDuration(ac.turnaround); // hours

  // Hub airport coords
  const hubAp = airports[hubICAO] || Object.values(airports).find(a => a.iata === ac.homeBaseIATA);
  if (!hubAp) return { status: 'ground', lat: null, lon: null, hubICAO };

  // Build legs array: each leg is { fromICAO, toICAO, deptHrs, arrHrs }
  const legs   = [];
  let   cursor = startHrs;

  for (let i = 0; i < dests.length; i++) {
    const destIATA = dests[i];
    const destAp   = Object.values(airports).find(a => a.iata === destIATA);
    if (!destAp) continue;

    // Outbound: hub → dest
    const distOut  = haversineNmi(hubAp.lat, hubAp.lon, destAp.lat, destAp.lon);
    const ftOut    = distOut / speedKts + 0.5; // hours, 30min fudge
    legs.push({
      fromIATA: hubAp.iata, toIATA: destIATA,
      fromLat: hubAp.lat, fromLon: hubAp.lon,
      toLat: destAp.lat, toLon: destAp.lon,
      deptHrs: cursor, arrHrs: cursor + ftOut,
    });
    cursor += ftOut + turnaround; // turnaround at destination

    // Inbound: dest → hub
    const ftIn = ftOut; // same distance
    legs.push({
      fromIATA: destIATA, toIATA: hubAp.iata,
      fromLat: destAp.lat, fromLon: destAp.lon,
      toLat: hubAp.lat, toLon: hubAp.lon,
      deptHrs: cursor, arrHrs: cursor + ftIn,
    });
    cursor += ftIn;

    // Turnaround at hub before next dest (except after last)
    if (i < dests.length - 1) cursor += turnaround;
  }

  // Find which leg we're currently on
  if (localHrs < startHrs) {
    return { status: 'ground', lat: hubAp.lat, lon: hubAp.lon, hubICAO, hubIATA: hubAp.iata };
  }

  for (const leg of legs) {
    if (localHrs >= leg.deptHrs && localHrs < leg.arrHrs) {
      const t   = (localHrs - leg.deptHrs) / (leg.arrHrs - leg.deptHrs);
      const pos = greatCircleInterp(leg.fromLat, leg.fromLon, leg.toLat, leg.toLon, t);
      const hdg = bearing(leg.fromLat, leg.fromLon, leg.toLat, leg.toLon);
      return {
        status:      'airborne',
        lat:         pos.lat,
        lon:         pos.lon,
        heading:     hdg,
        fromIATA:    leg.fromIATA,
        toIATA:      leg.toIATA,
        deptHrs:     leg.deptHrs,
        arrHrs:      leg.arrHrs,
        legProgress: t,
        hubICAO,
      };
    }

    // Between legs (on ground at intermediate point)
    const legIdx = legs.indexOf(leg);
    if (legIdx < legs.length - 1) {
      const next = legs[legIdx + 1];
      if (localHrs >= leg.arrHrs && localHrs < next.deptHrs) {
        // On ground at leg arrival airport
        return {
          status:   'ground',
          lat:      leg.toLat,
          lon:      leg.toLon,
          atIATA:   leg.toIATA,
          hubICAO,
        };
      }
    }
  }

  // After all legs complete — back at hub
  return { status: 'ground', lat: hubAp.lat, lon: hubAp.lon, hubICAO, hubIATA: hubAp.iata };
}
</script>


<script>
// ─────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────
const SHEET_ID = '1Gn2t_5jhLf_gPHJN5ojSX270ImGtH2EYZi4HbwDgZJk';
const SHEETS = {
  fleet:    'Fleet Information',
  airports: 'Airport Information',
  routes:   'Routes Master List',
  schedule: 'Aircraft Schedule',
};

// Timezone offsets from UTC in minutes
const HUB_TZ = {
  VNKT: 345,  // NPT  UTC+5:45
  VQPR: 360,  // BTT  UTC+6:00
  VEGT: 330,  // IST  UTC+5:30
  ZULS: 480,  // CST  UTC+8:00
  VNPR: 345,  // NPT  UTC+5:45
  VNBW: 345,  // NPT  UTC+5:45
  VILH: 330,  // IST  UTC+5:30 (Leh)
  OPSD: 300,  // PST  UTC+5:00 (Skardu)
};

function sheetUrl(name) {
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}`;
}

// ─────────────────────────────────────────────
// CLOCK
// ─────────────────────────────────────────────
function pad(n) { return String(n).padStart(2,'0'); }

function formatTime(date) {
  return `${pad(date.getUTCHours())}:${pad(date.getUTCMinutes())}:${pad(date.getUTCSeconds())}`;
}

function updateClocks() {
  const now   = new Date();
  const npt   = new Date(now.getTime() + 345*60*1000);
  const local = now.toLocaleTimeString('en-GB');
  document.getElementById('clock-npt').textContent   = formatTime(npt);
  document.getElementById('clock-utc').textContent   = formatTime(now);
  document.getElementById('clock-local').textContent = local;
}
setInterval(updateClocks, 1000);
updateClocks();

// ─────────────────────────────────────────────
// MAP
// ─────────────────────────────────────────────
const map = L.map('map', {
  center: [27.5, 87],
  zoom: 5,
  zoomControl: true,
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 18,
}).addTo(map);

// ─────────────────────────────────────────────
// DATA FETCHING
// ─────────────────────────────────────────────
async function fetchSheet(name) {
  const resp = await fetch(sheetUrl(name));
  const text = await resp.text();
  const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);/)[1]);
  return json.table;
}

function tableToObjects(table) {
  const headers = table.cols.map(c => c.label);
  return table.rows
    .filter(r => r && r.c && r.c.some(c => c && c.v !== null))
    .map(r => {
      const obj = {};
      headers.forEach((h, i) => { obj[h] = r.c[i] ? r.c[i].v : null; });
      return obj;
    });
}

// ─────────────────────────────────────────────
// STATUS
// ─────────────────────────────────────────────
function statusClass(s) {
  if (!s) return 'status-delivered';
  const l = s.toLowerCase();
  if (l.includes('service') || l === 'online') return 'status-online';
  if (l.includes('maintenance'))               return 'status-maintenance';
  if (l.includes('waiting'))                   return 'status-waiting';
  return 'status-delivered';
}

function statusLabel(s) {
  if (!s) return 'Delivered';
  const l = s.toLowerCase();
  if (l.includes('service') || l === 'online') return 'Online';
  if (l.includes('maintenance'))               return 'Maintenance';
  if (l.includes('waiting'))                   return 'Waiting';
  return s;
}

// ─────────────────────────────────────────────
// AIRPORT MARKERS
// ─────────────────────────────────────────────
function makeAirportMarker(ap) {
  const isHub = Object.keys(HUB_TZ).includes(ap['ICAO']);
  const marker = L.circleMarker([ap['Lat.'], ap['Lon']], {
    radius:      isHub ? 7 : 5,
    fillColor:   isHub ? '#BFA2DC' : '#5c158a',
    color:       isHub ? '#c7c9d3' : '#BFA2DC',
    weight:      1.5,
    fillOpacity: isHub ? 1 : 0.85,
  }).addTo(map);

  marker.bindPopup(`
    <div class="popup-iata">${ap['IATA']}</div>
    <div class="popup-name">${ap['Airport Name'] || ''}</div>
    <div class="popup-icao">${ap['ICAO'] || ''}</div>
  `);

  return marker;
}

// ─────────────────────────────────────────────
// MAIN INIT
// ─────────────────────────────────────────────
async function init() {
  try {
    document.getElementById('loading-msg').textContent = 'Loading fleet...';
    const fleet = tableToObjects(await fetchSheet(SHEETS.fleet))
      .filter(r => r['Aircraft Type'] && r['Registration']);

    // Sidebar
    const listEl = document.getElementById('fleet-list');
    listEl.innerHTML = '';
    fleet.forEach(ac => {
      const div = document.createElement('div');
      div.className = 'fleet-item';
      div.innerHTML = `
        <div class="fleet-item-left">
          <div class="fleet-reg">${ac['Registration']}</div>
          <div class="fleet-type">${ac['Aircraft Type']}</div>
          <div class="fleet-base">${ac['Home Base'] || '—'}</div>
        </div>
        <div class="fleet-status ${statusClass(ac['Status'])}">${statusLabel(ac['Status'])}</div>
      `;
      listEl.appendChild(div);
    });

    document.getElementById('fleet-count').textContent =
      `${fleet.length} aircraft`;

    document.getElementById('loading-msg').textContent = 'Loading airports...';
    const airports = tableToObjects(await fetchSheet(SHEETS.airports))
      .filter(r => r['IATA'] && r['Lat.'] && r['Lon']);

    airports.forEach(ap => makeAirportMarker(ap));

    document.getElementById('loading').style.display = 'none';

  } catch(err) {
    document.getElementById('loading-msg').textContent = 'Error: ' + err.message;
    console.error(err);
  }
}

init();
</script>
</body>
</html>
