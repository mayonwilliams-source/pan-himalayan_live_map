<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pan-Himalayan Airlines — Live Fleet Map</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Marcellus+SC&family=Alegreya+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --zanskar:#5c158a; --lilac:#BFA2DC; --marigold:#F7B500; --turquoise:#269473;
      --red:#D91E36; --mist:#c7c9d3; --bg:#000000; --bg2:#000000; --bg3:#0a0208;
      --border:#5c158a; --sidebar-w:280px; --panel-w:320px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Alegreya Sans',sans-serif; background:var(--bg); color:var(--mist); height:100vh; display:flex; flex-direction:column; overflow:hidden; }
    #topbar { display:flex; align-items:center; justify-content:space-between; padding:0 24px; height:52px; background:var(--bg2); border-bottom:1px solid var(--border); flex-shrink:0; z-index:1000; }
    .brand { display:flex; align-items:baseline; gap:12px; }
    .brand-name { font-family:'Marcellus SC',serif; font-size:18px; font-weight:600; letter-spacing:1.5px; color:var(--mist); }
    .brand-sub { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--lilac); font-family:'Marcellus SC',serif; }
    #clock-block { display:flex; gap:28px; }
    .tz { display:flex; flex-direction:column; align-items:center; gap:1px; }
    .tz .label { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--lilac); }
    .tz .time { font-size:15px; font-weight:600; color:var(--zanskar); font-variant-numeric:tabular-nums; letter-spacing:1px; }
    #fleet-count { font-size:12px; color:#444; letter-spacing:1px; }
    #main { display:flex; flex:1; overflow:hidden; position:relative; }
    #map { flex:1; background:var(--bg); }
    #sidebar { width:var(--sidebar-w); background:var(--bg2); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; flex-shrink:0; transition:width 0.3s,opacity 0.3s; position:relative; z-index:500; }
    #sidebar.collapsed { width:0; opacity:0; pointer-events:none; }
    #sidebar-toggle { position:absolute; left:var(--sidebar-w); top:50%; transform:translateY(-50%); z-index:600; width:18px; height:48px; background:var(--bg2); border:1px solid var(--border); border-left:none; border-radius:0 6px 6px 0; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--lilac); font-size:10px; transition:left 0.3s; }
    #sidebar-toggle.collapsed { left:0; border-left:1px solid var(--border); border-right:none; border-radius:6px 0 0 6px; }
    .sidebar-header { font-family:'Marcellus SC',serif; font-size:16px; letter-spacing:3px; text-transform:uppercase; color:var(--lilac); padding:16px 16px 12px; border-bottom:1px solid var(--border); white-space:nowrap; }
    #fleet-list { overflow-y:auto; flex:1; }
    #fleet-list::-webkit-scrollbar { width:4px; }
    #fleet-list::-webkit-scrollbar-track { background:var(--bg2); }
    #fleet-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
    .type-group { border-bottom:1px solid var(--border); }
    .type-group-header { display:flex; justify-content:space-between; align-items:center; padding:9px 16px; cursor:pointer; background:var(--bg3); transition:background 0.15s; font-family:'Marcellus SC',serif; font-size:11px; letter-spacing:1px; color:var(--lilac); }
    .type-group-header:hover { background:#110818; }
    .type-group-header .type-count { font-size:10px; color:#554466; }
    .type-group-header .type-chevron { font-size:9px; color:#554466; transition:transform 0.2s; }
    .type-group.open .type-chevron { transform:rotate(90deg); }
    .type-group-body { display:none; }
    .type-group.open .type-group-body { display:block; }
    .fleet-item { border-bottom:1px solid #1a0a2a; cursor:pointer; }
    .fleet-item-header { padding:9px 16px; display:flex; justify-content:space-between; align-items:flex-start; transition:background 0.15s; }
    .fleet-item-header:hover { background:var(--bg3); }
    .fleet-item.expanded .fleet-item-header { background:var(--bg3); }
    .fleet-reg { font-family:'Marcellus SC',serif; font-size:13px; font-weight:600; color:var(--mist); letter-spacing:1px; white-space:nowrap; }
    .fleet-base { font-size:11px; color:var(--lilac); margin-top:2px; opacity:0.7; }
    .fleet-status { font-size:9px; padding:2px 7px; border-radius:2px; font-weight:600; letter-spacing:1px; text-transform:uppercase; margin-top:2px; white-space:nowrap; }
    .status-online      { background:#0a2a0a; color:var(--turquoise); border:1px solid #1a4a1a; }
    .status-maintenance { background:#2a0a0a; color:var(--red);       border:1px solid #4a1a1a; }
    .status-waiting     { background:#2a1a00; color:var(--marigold);  border:1px solid #4a3a00; }
    .status-delivered   { background:#1a0a2a; color:var(--lilac);     border:1px solid #2a1a3a; }
    .fleet-item-body { display:none; padding:8px 16px 12px; border-top:1px solid #1a0a2a; background:#050008; font-size:12px; line-height:1.8; }
    .fleet-item.expanded .fleet-item-body { display:block; }
    .info-row { display:flex; justify-content:space-between; margin-bottom:2px; }
    .info-label { color:#665577; font-size:11px; }
    .info-val { color:var(--mist); font-size:12px; }
    .maintenance-msg { color:var(--red); font-size:12px; margin-top:4px; }
    #info-panel { width:0; background:var(--bg2); border-left:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; flex-shrink:0; transition:width 0.3s; z-index:500; }
    #info-panel.open { width:var(--panel-w); }
    #info-panel-inner { width:var(--panel-w); display:flex; flex-direction:column; height:100%; overflow:hidden; }
    #info-panel-header { display:flex; justify-content:space-between; align-items:center; padding:14px 16px 10px; border-bottom:1px solid var(--border); flex-shrink:0; }
    #info-panel-title { font-family:'Marcellus SC',serif; font-size:13px; letter-spacing:1px; color:var(--lilac); }
    #info-panel-close { background:none; border:none; color:#665577; cursor:pointer; font-size:16px; padding:0 4px; }
    #info-panel-close:hover { color:var(--mist); }
    #info-panel-body { overflow-y:auto; flex:1; padding:14px 16px; font-size:13px; line-height:1.9; }
    #info-panel-body::-webkit-scrollbar { width:4px; }
    #info-panel-body::-webkit-scrollbar-track { background:var(--bg2); }
    #info-panel-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
    .tab-bar { display:flex; border-bottom:1px solid var(--border); flex-shrink:0; margin:0 -16px; padding:0 16px; }
    .tab { flex:1; padding:9px 4px; text-align:center; font-size:11px; letter-spacing:1px; font-family:'Marcellus SC',serif; color:#554466; cursor:pointer; border-bottom:2px solid transparent; transition:all 0.15s; }
    .tab:hover { color:var(--mist); }
    .tab.active { color:var(--lilac); border-bottom-color:var(--lilac); }
    .tab-content { display:none; padding-top:12px; }
    .tab-content.active { display:block; }
    .panel-section { margin-bottom:16px; }
    .panel-section-title { font-family:'Marcellus SC',serif; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--zanskar); margin-bottom:8px; border-bottom:1px solid var(--border); padding-bottom:4px; }
    .panel-row { display:flex; justify-content:space-between; margin-bottom:3px; }
    .panel-label { color:#665577; font-size:11px; }
    .panel-val { color:var(--mist); font-size:12px; text-align:right; }
    .panel-reg { font-family:'Marcellus SC',serif; font-size:22px; color:var(--lilac); letter-spacing:2px; margin-bottom:4px; }
    .panel-type { font-size:13px; color:#887799; margin-bottom:12px; }
    .panel-iata { font-family:'Marcellus SC',serif; font-size:26px; color:var(--lilac); letter-spacing:3px; margin-bottom:2px; }
    .panel-airport-name { font-size:12px; color:#887799; margin-bottom:12px; }

    /* Flight leg cards */
    .leg-card { padding:8px 10px; border-radius:4px; background:#0a0012; margin-bottom:6px; border:1px solid #1a0a2a; font-size:13px; }
    .leg-card.live { background:rgba(92,21,138,0.18); border-color:var(--zanskar); cursor:pointer; }
    .leg-card.live:hover { background:rgba(92,21,138,0.28); }
    .leg-card-route { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:3px; }
    .leg-card-pair { font-family:'Marcellus SC',serif; font-size:14px; color:var(--mist); letter-spacing:0.5px; }
    .leg-card-pair.live { color:var(--lilac); }
    .leg-card-reg { font-size:11px; color:#554466; }
    .leg-card-status { font-size:11px; color:#665577; }
    .leg-card-status .status-time { color:var(--mist); font-weight:600; margin-left:4px; }
    .leg-card-status.live-status { color:var(--turquoise); }
    .leg-card-status.live-status .status-time { color:var(--turquoise); }

    .ac-ground-item { padding:6px 0; border-bottom:1px solid #1a0a2a; font-size:12px; }
    .ac-ground-item:last-child { border-bottom:none; }
    .ac-ground-reg { font-family:'Marcellus SC',serif; color:var(--mist); font-size:13px; }
    .ac-ground-type { color:#665577; font-size:11px; margin-top:1px; }

    .leaflet-container { background:var(--bg); }
    .leaflet-control-zoom a { background:var(--bg2) !important; color:var(--mist) !important; border-color:var(--border) !important; }
    .leaflet-control-zoom a:hover { background:var(--bg3) !important; }
    .leaflet-control-attribution { background:rgba(10,2,8,0.85) !important; color:#333 !important; font-size:9px !important; }
    .leaflet-control-attribution a { color:#444 !important; }
    .leaflet-popup-content-wrapper { background:var(--bg2) !important; color:var(--mist) !important; border:1px solid var(--border) !important; border-radius:4px !important; box-shadow:0 4px 20px rgba(0,0,0,0.6) !important; font-family:'Alegreya Sans',sans-serif !important; }
    .leaflet-popup-tip { background:var(--bg2) !important; }
    .leaflet-popup-content { font-size:13px; line-height:1.6; margin:10px 14px !important; }
    .leaflet-tooltip { background:var(--bg2) !important; border:1px solid var(--border) !important; color:var(--mist) !important; font-family:'Alegreya Sans',sans-serif !important; font-size:11px !important; }
    #loading { position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; gap:20px; }
    #loading .logo { font-family:'Marcellus SC',serif; font-size:26px; font-weight:600; color:var(--mist); letter-spacing:2px; }
    #loading .tagline { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--lilac); }
    #loading .spinner { width:36px; height:36px; border:2px solid var(--border); border-top-color:var(--zanskar); border-radius:50%; animation:spin 0.9s linear infinite; }
    #loading .msg { font-size:12px; color:#443355; letter-spacing:1px; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>

<div id="loading">
  <div class="logo">Pan-Himalayan Airlines</div>

</div>

<div id="topbar">

  </div>
  <div id="clock-block">
    <div class="tz"><div class="label">NPT</div><div class="time" id="clock-npt">--:--:--</div></div>

<div id="main">

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<script>
// ── POSITION ENGINE ───────────────────────────

function haversineNmi(lat1,lon1,lat2,lon2){
  const R=3440.065,phi1=lat1*Math.PI/180,phi2=lat2*Math.PI/180;
  const dphi=(lat2-lat1)*Math.PI/180,dlam=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dphi/2)**2+Math.cos(phi1)*Math.cos(phi2)*Math.sin(dlam/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function greatCircleInterp(lat1,lon1,lat2,lon2,t){
  const toRad=d=>d*Math.PI/180,toDeg=r=>r*180/Math.PI;
  const φ1=toRad(lat1),λ1=toRad(lon1),φ2=toRad(lat2),λ2=toRad(lon2);
  const d=2*Math.asin(Math.sqrt(Math.sin((φ2-φ1)/2)**2+Math.cos(φ1)*Math.cos(φ2)*Math.sin((λ2-λ1)/2)**2));
  if(d<1e-10) return {lat:lat1,lon:lon1};
  const A=Math.sin((1-t)*d)/Math.sin(d),B=Math.sin(t*d)/Math.sin(d);
  const x=A*Math.cos(φ1)*Math.cos(λ1)+B*Math.cos(φ2)*Math.cos(λ2);
  const y=A*Math.cos(φ1)*Math.sin(λ1)+B*Math.cos(φ2)*Math.sin(λ2);
  const z=A*Math.sin(φ1)+B*Math.sin(φ2);
  return {lat:toDeg(Math.atan2(z,Math.sqrt(x*x+y*y))),lon:toDeg(Math.atan2(y,x))};
}
function gcPoints(lat1,lon1,lat2,lon2,n=80){
  const pts=[];
  for(let i=0;i<=n;i++){const p=greatCircleInterp(lat1,lon1,lat2,lon2,i/n);pts.push([p.lat,p.lon]);}
  return pts;
}
function bearing(lat1,lon1,lat2,lon2){
  const toRad=d=>d*Math.PI/180;
  const φ1=toRad(lat1),φ2=toRad(lat2),Δλ=toRad(lon2-lon1);
  const y=Math.sin(Δλ)*Math.cos(φ2),x=Math.cos(φ1)*Math.sin(φ2)-Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ);
  return (Math.atan2(y,x)*180/Math.PI+360)%360;
}
function parseDuration(str){
  if(!str) return 0;
  const parts=String(str).split(':').map(Number);
  return parts[0]+(parts[1]||0)/60+(parts[2]||0)/3600;
}
function parseTime(str){
  if(!str) return 6;
  const parts=String(str).split(':').map(Number);
  return parts[0]+(parts[1]||0)/60;
}
function buildLegs(ac,route,airports){
  const hubAp=airports[ac.homeBase];
  if(!hubAp||!route) return [];
  const dests=route.dests.split(',').map(s=>s.trim()).filter(Boolean);
  const startHrs=route.startTime!==null?route.startTime:6.0;
  const speedKts=ac.speed||447;
  const turnaround=parseDuration(ac.turnaround);
  const legs=[];
  let cursor=startHrs;
  for(let i=0;i<dests.length;i++){
    const destAp=Object.values(airports).find(a=>a.iata===dests[i]);
    if(!destAp) continue;
    const dist=haversineNmi(hubAp.lat,hubAp.lon,destAp.lat,destAp.lon);
    const ft=dist/speedKts+0.5;
    legs.push({fromIATA:hubAp.iata,toIATA:dests[i],fromLat:hubAp.lat,fromLon:hubAp.lon,toLat:destAp.lat,toLon:destAp.lon,deptHrs:cursor,arrHrs:cursor+ft});
    cursor+=ft+turnaround;
    legs.push({fromIATA:dests[i],toIATA:hubAp.iata,fromLat:destAp.lat,fromLon:destAp.lon,toLat:hubAp.lat,toLon:hubAp.lon,deptHrs:cursor,arrHrs:cursor+ft});
    cursor+=ft;
    if(i<dests.length-1) cursor+=turnaround;
  }
  return legs;
}
function computePosition(ac,route,airports,nowUTC){
  const hubICAO=ac.homeBase;
  const tzOffset=HUB_TZ[hubICAO]||345;
  const nowLocal=new Date(nowUTC.getTime()+tzOffset*60000);
  const localHrs=nowLocal.getUTCHours()+nowLocal.getUTCMinutes()/60+nowLocal.getUTCSeconds()/3600;
  const jsDow=nowLocal.getUTCDay();
  const sheetDow=jsDow===0?6:jsDow-1;
  const destStr=ac.schedule[sheetDow];
  if(!destStr) return {status:'ground',lat:null,lon:null,hubICAO};
  const hubAp=airports[hubICAO];
  if(!hubAp) return {status:'ground',lat:null,lon:null,hubICAO};
  const legs=buildLegs(ac,route,airports);
  if(!legs.length) return {status:'ground',lat:hubAp.lat,lon:hubAp.lon,hubICAO};
  const startHrs=route.startTime!==null?route.startTime:6.0;
  if(localHrs<startHrs) return {status:'ground',lat:hubAp.lat,lon:hubAp.lon,hubICAO,hubIATA:hubAp.iata};
  for(let i=0;i<legs.length;i++){
    const leg=legs[i];
    if(localHrs>=leg.deptHrs&&localHrs<leg.arrHrs){
      const t=(localHrs-leg.deptHrs)/(leg.arrHrs-leg.deptHrs);
      const pos=greatCircleInterp(leg.fromLat,leg.fromLon,leg.toLat,leg.toLon,t);
      return {status:'airborne',lat:pos.lat,lon:pos.lon,heading:bearing(leg.fromLat,leg.fromLon,leg.toLat,leg.toLon),fromIATA:leg.fromIATA,toIATA:leg.toIATA,deptHrs:leg.deptHrs,arrHrs:leg.arrHrs,legT:t,leg,hubICAO};
    }
    if(i<legs.length-1&&localHrs>=leg.arrHrs&&localHrs<legs[i+1].deptHrs){
      return {status:'ground',lat:leg.toLat,lon:leg.toLon,atIATA:leg.toIATA,hubICAO};
    }
  }
  return {status:'ground',lat:hubAp.lat,lon:hubAp.lon,hubICAO,hubIATA:hubAp.iata};
}
function getLegsInWindow(ac,routeMap,airports,nowUTC,pastHrs,futureHrs){
  const hubICAO=ac.homeBase;
  const tzOffset=HUB_TZ[hubICAO]||345;
  const nowLocal=new Date(nowUTC.getTime()+tzOffset*60000);
  const localHrs=nowLocal.getUTCHours()+nowLocal.getUTCMinutes()/60+nowLocal.getUTCSeconds()/3600;
  const jsDow=nowLocal.getUTCDay();
  const results=[];
  for(let dayOffset=-1;dayOffset<=2;dayOffset++){
    const rawDow=(jsDow+dayOffset+7)%7;
    const sd=rawDow===0?6:rawDow-1;
    const routeNum=ac.routeNums[sd];
    const route=routeNum?routeMap[routeNum]:null;
    if(!route) continue;
    const legs=buildLegs(ac,route,airports);
    legs.forEach(leg=>{
      const legDept=leg.deptHrs+dayOffset*24;
      const legArr=leg.arrHrs+dayOffset*24;
      if(legArr>localHrs-pastHrs&&legDept<localHrs+futureHrs){
        results.push({...leg,deptHrs:legDept,arrHrs:legArr,dayOffset});
      }
    });
  }
  return results.sort((a,b)=>a.deptHrs-b.deptHrs);
}
function getAirportLegsInWindow(iata,aircraftData,routeMap,airports,nowUTC,pastHrs,futureHrs){
  const deps=[],arrs=[],ground=[];
  aircraftData.forEach(ac=>{
    const legs=getLegsInWindow(ac,routeMap,airports,nowUTC,pastHrs,futureHrs);
    const tz=HUB_TZ[ac.homeBase]||345;
    const nowLocal=new Date(nowUTC.getTime()+tz*60000);
    const nowHrs=nowLocal.getUTCHours()+nowLocal.getUTCMinutes()/60+nowLocal.getUTCSeconds()/3600;
    legs.forEach(leg=>{
      if(leg.fromIATA===iata) deps.push({ac,leg,nowHrs});
      if(leg.toIATA===iata)   arrs.push({ac,leg,nowHrs});
    });
    const pos=window.posCache?.[ac.reg];
    if(pos&&pos.status==='ground'){
      const hubAp=airports[ac.homeBase];
      const atIATA=pos.atIATA||(hubAp?hubAp.iata:null);
      if(atIATA===iata) ground.push(ac);
    }
  });
  return {deps,arrs,ground};
}
function getConnectedIATAs(iata,routeMap,airports){
  const connected=new Set();
  const ap=Object.values(airports).find(a=>a.iata===iata);
  const isHub=ap&&Object.keys(HUB_TZ).includes(ap.icao);
  Object.values(routeMap).forEach(route=>{
    const dests=route.dests.split(',').map(s=>s.trim());
    if(isHub&&route.hub===iata){
      dests.forEach(d=>connected.add(d));
    } else if(!isHub&&dests.includes(iata)){
      connected.add(route.hub);
    }
  });
  connected.delete(iata);
  return connected;
}
</script>

<script>
const SHEET_ID='1Gn2t_5jhLf_gPHJN5ojSX270ImGtH2EYZi4HbwDgZJk';
const SHEETS={fleet:'Fleet Information',airports:'Airport Information',routes:'Routes Master List',schedule:'Aircraft Schedule'};
const HUB_TZ={VNKT:345,VQPR:360,VEGT:330,ZULS:480,VNPR:345,VNBW:345,VILH:330,OPSD:300};

function sheetUrl(name){return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(name)}`;}
function pad(n){return String(n).padStart(2,'0');}
function formatTime(d){return `${pad(d.getUTCHours())}:${pad(d.getUTCMinutes())}:${pad(d.getUTCSeconds())}`;}
function fmtHrs(h){
  if(h===undefined||h===null) return '—';
  const total=((h%24)+24)%24;
  return `${Math.floor(total)}:${pad(Math.round((total%1)*60))}`;
}
function hrsToUTC(localH,tzOffsetMin){return ((localH-tzOffsetMin/60)%24+24)%24;}

function updateClocks(){
  const now=new Date();
  document.getElementById('clock-npt').textContent=formatTime(new Date(now.getTime()+345*60000));
  document.getElementById('clock-utc').textContent=formatTime(now);
  document.getElementById('clock-local').textContent=now.toLocaleTimeString('en-GB');
}
setInterval(updateClocks,1000);
updateClocks();

function toggleSidebar(){
  const sb=document.getElementById('sidebar');
  const btn=document.getElementById('sidebar-toggle');
  const collapsed=sb.classList.toggle('collapsed');
  btn.classList.toggle('collapsed',collapsed);
  btn.innerHTML=collapsed?'&#9654;':'&#9664;';
}
function collapseSidebar(){
  const sb=document.getElementById('sidebar');
  const btn=document.getElementById('sidebar-toggle');
  sb.classList.add('collapsed');
  btn.classList.add('collapsed');
  btn.innerHTML='&#9654;';
}

const map=L.map('map',{center:[27.5,87],zoom:5});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO',maxZoom:19}).addTo(map);

async function fetchSheet(name){
  const resp=await fetch(sheetUrl(name));
  const text=await resp.text();
  const json=JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);/)[1]);
  return json.table;
}
function tableToObjects(table){
  const headers=table.cols.map(c=>c.label);
  return table.rows.filter(r=>r&&r.c&&r.c.some(c=>c&&c.v!==null)).map(r=>{
    const obj={};
    headers.forEach((h,i)=>{obj[h]=r.c[i]?r.c[i].v:null;});
    return obj;
  });
}
function statusClass(s){
  if(!s) return 'status-delivered';
  const l=s.toLowerCase();
  if(l.includes('service')||l==='online') return 'status-online';
  if(l.includes('maintenance'))           return 'status-maintenance';
  if(l.includes('waiting'))               return 'status-waiting';
  return 'status-delivered';
}
function statusLabel(s){
  if(!s) return 'Delivered';
  const l=s.toLowerCase();
  if(l.includes('service')||l==='online') return 'Online';
  if(l.includes('maintenance'))           return 'Maintenance';
  if(l.includes('waiting'))               return 'Waiting';
  return s;
}
function planeIcon(heading){
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" style="transform:rotate(${heading||0}deg);display:block;">
    <path fill="#269473" d="M21,16L13,12V5.5A1.5,1.5,0,0,0,10,5.5V12L2,16V18L10,15.5V20L8,21.5V23L12,22L16,23V21.5L14,20V15.5L22,18Z"/>
  </svg>`;
  return L.divIcon({html:svg,className:'',iconSize:[24,24],iconAnchor:[12,12]});
}

let activeArcs=[];
function clearArcs(){activeArcs.forEach(l=>map.removeLayer(l));activeArcs=[];}
function drawFlightArc(leg,progress){
  clearArcs();
  const allPts=gcPoints(leg.fromLat,leg.fromLon,leg.toLat,leg.toLon,80);
  const splitIdx=Math.round(progress*80);
  const elapsed=allPts.slice(0,splitIdx+1);
  const remaining=allPts.slice(splitIdx);
  if(elapsed.length>1){const l=L.polyline(elapsed,{color:'#5c158a',weight:2.5,opacity:0.9}).addTo(map);l.bringToBack();activeArcs.push(l);}
  if(remaining.length>1){const l=L.polyline(remaining,{color:'#BFA2DC',weight:2,opacity:0.7,dashArray:'5,5'}).addTo(map);l.bringToBack();activeArcs.push(l);}
}
function drawNetworkArcs(ap,connectedIATAs,airports){
  clearArcs();
  connectedIATAs.forEach(iata=>{
    const destAp=Object.values(airports).find(a=>a.iata===iata);
    if(!destAp) return;
    const pts=gcPoints(ap.lat,ap.lon,destAp.lat,destAp.lon,60);
    const l=L.polyline(pts,{color:'#BFA2DC',weight:1.5,opacity:0.5,dashArray:'4,6'}).addTo(map);
    l.bringToBack();
    activeArcs.push(l);
  });
}

function switchTab(tabId){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+tabId).classList.add('active');
  document.getElementById('tabcontent-'+tabId).classList.add('active');
}

function closeInfoPanel(){
  document.getElementById('info-panel').classList.remove('open');
  clearArcs();
}

function openAircraftPanel(ac,pos,route,routeMap,airports){
  collapseSidebar();
  const panel=document.getElementById('info-panel');
  const body=document.getElementById('info-panel-body');
  document.getElementById('info-panel-title').textContent=ac.reg;
  panel.classList.add('open');
  const tz=HUB_TZ[ac.homeBase]||345;
  const isMaint=ac.status&&ac.status.toLowerCase().includes('maintenance');
  if(isMaint){
    body.innerHTML=`
      <div class="panel-reg">${ac.reg}</div>
      <div class="panel-type">${ac.type}</div>
      <div class="panel-section">
        <div class="panel-section-title">Status</div>
        <div style="color:var(--red);font-size:13px;">✖ Offline for Maintenance</div>
        <div class="panel-row" style="margin-top:8px;"><span class="panel-label">Home Base</span><span class="panel-val">${ac.homeBase}</span></div>
      </div>`;
    return;
  }
  if(pos.status==='airborne'&&pos.leg) drawFlightArc(pos.leg,pos.legT);

  const now=new Date();
  const nowLocal=new Date(now.getTime()+tz*60000);
  const nowHrs=nowLocal.getUTCHours()+nowLocal.getUTCMinutes()/60+nowLocal.getUTCSeconds()/3600;

  const allLegs=getLegsInWindow(ac,routeMap,airports,now,12,24);
  const pastLegs=allLegs.filter(l=>l.arrHrs<nowHrs).slice(-4);
  const futureAndCurrent=allLegs.filter(l=>l.arrHrs>=nowHrs).slice(0,10);
  const displayLegs=[...pastLegs,...futureAndCurrent];

  let statusHtml='';
  if(pos.status==='airborne'){
    const elapsed=nowHrs-pos.deptHrs;
    const rem=pos.arrHrs-nowHrs;
    statusHtml=`
      <div class="panel-section">
        <div class="panel-section-title">Current Leg</div>
        <div class="panel-row"><span class="panel-label">Route</span><span class="panel-val">${pos.fromIATA} → ${pos.toIATA}</span></div>
        <div class="panel-row"><span class="panel-label">Departed</span><span class="panel-val">${fmtHrs(pos.deptHrs)} LT<br><span style="font-size:10px;color:#665577;">${fmtHrs(hrsToUTC(pos.deptHrs,tz))}z</span></span></div>
        <div class="panel-row"><span class="panel-label">Arrives</span><span class="panel-val">${fmtHrs(pos.arrHrs)} LT<br><span style="font-size:10px;color:#665577;">${fmtHrs(hrsToUTC(pos.arrHrs,tz))}z</span></span></div>
        <div class="panel-row"><span class="panel-label">Elapsed</span><span class="panel-val">${Math.floor(elapsed)}h ${pad(Math.round((elapsed%1)*60))}m</span></div>
        <div class="panel-row"><span class="panel-label">Remaining</span><span class="panel-val">${Math.floor(rem)}h ${pad(Math.round((rem%1)*60))}m</span></div>
      </div>`;
  } else {
    const loc=pos.atIATA||pos.hubIATA||ac.homeBase;
    statusHtml=`
      <div class="panel-section">
        <div class="panel-section-title">Status</div>
        <div class="panel-row"><span class="panel-label">On ground at</span><span class="panel-val">${loc}</span></div>
      </div>`;
  }

  const legsHtml=displayLegs.map(leg=>{
    const isPast=leg.arrHrs<nowHrs;
    const isLive=leg.deptHrs<=nowHrs&&leg.arrHrs>nowHrs;
    const timeStr=isPast?fmtHrs(leg.arrHrs):fmtHrs(leg.deptHrs);
    const label=isPast?'Arrived':isLive?'Live — Arr':fmtHrs(leg.deptHrs);
    return `<div class="leg-card${isLive?' live':''}">
      <div class="leg-card-route">
        <span class="leg-card-pair${isLive?' live':''}">${leg.fromIATA} → ${leg.toIATA}</span>
        <span class="leg-card-reg">${ac.reg}</span>
      </div>
      <div class="leg-card-status${isLive?' live-status':''}">
        ${isPast?'Arrived':'isLive'?'ETA':'ETD'}<span class="status-time">${timeStr} LT</span>
      </div>
    </div>`;
  }).join('');

  body.innerHTML=`
    <div class="panel-reg">${ac.reg}</div>
    <div class="panel-type">${ac.type}</div>
    <div class="panel-section">
      <div class="panel-section-title">Info</div>
      <div class="panel-row"><span class="panel-label">Home Base</span><span class="panel-val">${ac.homeBase}</span></div>
      <div class="panel-row"><span class="panel-label">Status</span><span class="panel-val">${statusLabel(ac.status)}</span></div>
    </div>
    ${statusHtml}
    <div class="panel-section">
      <div class="panel-section-title">Flights</div>
      ${legsHtml||'<div style="color:#443355;font-size:12px;">No flights in window</div>'}
    </div>`;
}

function openAirportPanel(ap,aircraftData,routeMap,airports){
  collapseSidebar();
  clearArcs();
  const connected=getConnectedIATAs(ap.iata,routeMap,airports);
  drawNetworkArcs(ap,connected,airports);
  const panel=document.getElementById('info-panel');
  const body=document.getElementById('info-panel-body');
  document.getElementById('info-panel-title').textContent=`${ap.iata} / ${ap.icao}`;
  panel.classList.add('open');
  const now=new Date();
  const {deps,arrs,ground}=getAirportLegsInWindow(ap.iata,aircraftData,routeMap,airports,now,12,24);
  const apTZ=Object.entries(HUB_TZ).find(([icao])=>icao===ap.icao);
  const tzOff=apTZ?apTZ[1]:null;
  const localTimeStr=tzOff!==null?formatTime(new Date(now.getTime()+tzOff*60000))+' LT':'—';

  function legRow(item,type){
    const tz=HUB_TZ[item.ac.homeBase]||345;
    const nl=new Date(now.getTime()+tz*60000);
    const nowHrs=nl.getUTCHours()+nl.getUTCMinutes()/60+nl.getUTCSeconds()/3600;
    const isPast=item.leg.arrHrs<nowHrs;
    const isLive=item.leg.deptHrs<=nowHrs&&item.leg.arrHrs>nowHrs;
    const timeVal=type==='arr'
      ?(isPast?fmtHrs(item.leg.arrHrs):fmtHrs(item.leg.arrHrs))
      :(isPast?fmtHrs(item.leg.deptHrs):fmtHrs(item.leg.deptHrs));
    const statusWord=type==='arr'
      ?(isPast?'Arrived':isLive?'ETA':'ETA')
      :(isPast?'Departed':isLive?'Live':'ETD');
    const clickAttr=isLive?`onclick="window._openAcFromAirport('${item.ac.reg}')" style="cursor:pointer;"`:''
    return `<div class="leg-card${isLive?' live':''}" ${clickAttr}>
      <div class="leg-card-route">
        <span class="leg-card-pair${isLive?' live':''}">${item.leg.fromIATA} → ${item.leg.toIATA}</span>
        <span class="leg-card-reg">${item.ac.reg}</span>
      </div>
      <div class="leg-card-status${isLive?' live-status':''}">
        ${statusWord}<span class="status-time">${timeVal} LT</span>
      </div>
    </div>`;
  }

  const depsHtml=deps.length?deps.map(i=>legRow(i,'dep')).join(''):'<div style="color:#443355;font-size:12px;">None in window</div>';
  const arrsHtml=arrs.length?arrs.map(i=>legRow(i,'arr')).join(''):'<div style="color:#443355;font-size:12px;">None in window</div>';
  const groundHtml=ground.length?ground.map(ac=>`
    <div class="ac-ground-item">
      <div class="ac-ground-reg">${ac.reg}</div>
      <div class="ac-ground-type">${ac.type}</div>
    </div>`).join(''):'<div style="color:#443355;font-size:12px;">No aircraft on ground</div>';

  body.innerHTML=`
    <div class="panel-iata">${ap.iata}</div>
    <div class="panel-airport-name">${ap.name||''} · ${ap.icao}</div>
    <div class="panel-section">
      <div class="panel-section-title">Info</div>
      <div class="panel-row"><span class="panel-label">Local Time</span><span class="panel-val">${localTimeStr}</span></div>
      ${ap.elev!==null&&ap.elev!==undefined?`<div class="panel-row"><span class="panel-label">Elevation</span><span class="panel-val">${ap.elev} ft</span></div>`:''}
      <div class="panel-row"><span class="panel-label">Connections</span><span class="panel-val">${connected.size}</span></div>
    </div>
    <div class="tab-bar">
      <div class="tab active" id="tab-deps" onclick="switchTab('deps')">Departures</div>
      <div class="tab" id="tab-arrs" onclick="switchTab('arrs')">Arrivals</div>
      <div class="tab" id="tab-ground" onclick="switchTab('ground')">On Ground</div>
    </div>
    <div class="tab-content active" id="tabcontent-deps">${depsHtml}</div>
    <div class="tab-content" id="tabcontent-arrs">${arrsHtml}</div>
    <div class="tab-content" id="tabcontent-ground">${groundHtml}</div>`;
}

let expandedReg=null;
function expandCard(reg){
  if(expandedReg&&expandedReg!==reg){
    const prev=document.getElementById('card-'+expandedReg);
    if(prev) prev.classList.remove('expanded');
  }
  const card=document.getElementById('card-'+reg);
  if(!card) return;
  const isExpanding=!card.classList.contains('expanded');
  card.classList.toggle('expanded');
  expandedReg=isExpanding?reg:null;
  const body=card.querySelector('.fleet-item-body');
  if(!body||!isExpanding) return;
  const ac=window.aircraftDataMap[reg];
  const pos=window.posCache[reg];
  if(!ac) return;
  const isMaint=ac.status&&ac.status.toLowerCase().includes('maintenance');
  if(isMaint){
    body.innerHTML=`<div class="maintenance-msg">✖ Offline for Maintenance</div>
      <div class="info-row" style="margin-top:6px;"><span class="info-label">Home base</span><span class="info-val">${ac.homeBase}</span></div>`;
    return;
  }
  if(!pos||pos.status==='ground'){
    const loc=pos?.atIATA||pos?.hubIATA||ac.homeBase||'—';
    body.innerHTML=`
      <div class="info-row"><span class="info-label">Status</span><span class="info-val">On ground</span></div>
      <div class="info-row"><span class="info-label">Location</span><span class="info-val">${loc}</span></div>
      <div class="info-row"><span class="info-label">Home base</span><span class="info-val">${ac.homeBase}</span></div>`;
  } else {
    body.innerHTML=`
      <div class="info-row"><span class="info-label">Status</span><span class="info-val">✈ Airborne</span></div>
      <div class="info-row"><span class="info-label">Route</span><span class="info-val">${pos.fromIATA} → ${pos.toIATA}</span></div>
      <div class="info-row"><span class="info-label">Departed</span><span class="info-val">${fmtHrs(pos.deptHrs)} LT</span></div>
      <div class="info-row"><span class="info-label">Arrives</span><span class="info-val">${fmtHrs(pos.arrHrs)} LT</span></div>
      <div class="info-row"><span class="info-label">Home base</span><span class="info-val">${ac.homeBase}</span></div>`;
  }
}

async function init(){
  try{
    console.log('Init started');
    document.getElementById('loading-msg').textContent='Loading fleet...';
    const fleetRaw=tableToObjects(await fetchSheet(SHEETS.fleet));
    const fleet=fleetRaw.filter(r=>r['Fleet Information Aircraft Type']&&r['Registration']);

    document.getElementById('loading-msg').textContent='Loading routes...';
    const routesRaw=tableToObjects(await fetchSheet(SHEETS.routes)).filter(r=>r['Route Master List No.']&&r['Route']);
    const routeMap={};
    routesRaw.forEach(r=>{routeMap[r['Route Master List No.']]={id:r['Route Master List No.'],hub:r['Hub'],dests:r['Route'],startTime:r['Start Time (LT)']?parseTime(r['Start Time (LT)']):6.0};});

    document.getElementById('loading-msg').textContent='Loading schedule...';
    const scheduleRaw=tableToObjects(await fetchSheet(SHEETS.schedule)).filter(r=>r['Aircraft']&&r['Aircraft Schedule Aircraft Type']);

    const activeIATA=new Set();
    scheduleRaw.forEach(row=>{
      ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'].forEach(day=>{
        if(row[day]) row[day].split(',').map(s=>s.trim()).forEach(d=>activeIATA.add(d));
      });
      if(row['Homebase']) activeIATA.add(row['Homebase']);
    });

    document.getElementById('loading-msg').textContent='Loading airports...';
    const airportsRaw=tableToObjects(await fetchSheet(SHEETS.airports)).filter(r=>r['Airport Information IATA']&&r['Lat.']&&r['Lon.']);
    const airportsByICAO={};
    airportsRaw.forEach(ap=>{
      const iata=ap['Airport Information IATA'],icao=ap['ICAO'];
      if(!activeIATA.has(iata)&&!activeIATA.has(icao)) return;
      const obj={lat:ap['Lat.'],lon:ap['Lon.'],iata,icao,name:ap['Airport Name'],elev:ap['Elevation (ft)']||null};
      airportsByICAO[icao]=obj;
      const isHub=Object.keys(HUB_TZ).includes(icao);
      const marker=L.circleMarker([obj.lat,obj.lon],{
        radius:      isHub ? 9 : 5,
        fillColor:   isHub ? '#5c158a' : '#BFA2DC',
        color:       isHub ? '#c7c9d3' : '#5c158a',
        weight:      isHub ? 2 : 1.5,
        fillOpacity: isHub ? 1 : 0.85,
      }).addTo(map);
      marker.bindTooltip(`<b>${iata}</b> / ${icao}`,{className:'leaflet-tooltip',permanent:false,direction:'top'});
      marker.on('click',()=>openAirportPanel(obj,window._aircraftData,routeMap,airportsByICAO));
    });

    const aircraftData=[];
    scheduleRaw.forEach(row=>{
      const reg=row['Aircraft'];
      const fleetRow=fleet.find(f=>f['Registration']===reg);
      if(!fleetRow) return;
      aircraftData.push({
        reg,type:row['Aircraft Schedule Aircraft Type'],homeBase:row['Homebase'],
        status:fleetRow['Status'],speed:parseFloat(fleetRow['Average Cruise Speed [kts]'])||447,
        turnaround:fleetRow['Turnaround Time']||'0:45:00',
        schedule:['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'].map(d=>row[d]),
        routeNums:['M','Tu','W','Th','F','Sa','Su'].map(d=>row[d]),
      });
    });

    const typeGroups={};
    aircraftData.forEach(ac=>{
      if(!typeGroups[ac.type]) typeGroups[ac.type]=[];
      typeGroups[ac.type].push(ac);
    });

    const listEl=document.getElementById('fleet-list');
    listEl.innerHTML='';
    document.getElementById('fleet-count').textContent=`${fleet.length} aircraft`;

    const planeMarkers={};
    const posCache={};

    aircraftData.forEach(ac=>{
      if(!ac.homeBase) return;
      const hubAp=airportsByICAO[ac.homeBase];
      const now=new Date();
      const jsDow=new Date(now.getTime()+(HUB_TZ[ac.homeBase]||345)*60000).getUTCDay();
      const sheetDow=jsDow===0?6:jsDow-1;
      const routeNum=ac.routeNums[sheetDow];
      const route=routeNum?routeMap[routeNum]:null;
      const pos=route&&hubAp?computePosition(ac,route,airportsByICAO,now):{status:'ground',lat:hubAp?.lat||null,lon:hubAp?.lon||null};
      posCache[ac.reg]=pos;
      if(pos.status==='airborne'){
        const marker=L.marker([pos.lat,pos.lon],{icon:planeIcon(pos.heading)}).addTo(map);
        marker.bindTooltip(ac.reg,{permanent:false,direction:'top',className:'leaflet-tooltip'});
        marker.on('click',()=>openAircraftPanel(ac,pos,route,routeMap,airportsByICAO));
        planeMarkers[ac.reg]={marker,ac,route};
      }
    });

    Object.entries(typeGroups).forEach(([type,acs])=>{
      const groupDiv=document.createElement('div');
      groupDiv.className='type-group';
      groupDiv.innerHTML=`
        <div class="type-group-header" onclick="this.parentElement.classList.toggle('open')">
          <span>${type}</span>
          <span>
            <span class="type-count">${acs.length}</span>
            <span class="type-chevron" style="margin-left:6px;">▶</span>
          </span>
        </div>
        <div class="type-group-body"></div>`;
      const groupBody=groupDiv.querySelector('.type-group-body');
      acs.forEach(ac=>{
        const div=document.createElement('div');
        div.className='fleet-item';
        div.id='card-'+ac.reg;
        div.innerHTML=`
          <div class="fleet-item-header" onclick="expandCard('${ac.reg}')">
            <div>
              <div class="fleet-reg">${ac.reg}</div>
              <div class="fleet-base">${ac.homeBase}</div>
            </div>
            <div class="fleet-status ${statusClass(ac.status)}">${statusLabel(ac.status)}</div>
          </div>
          <div class="fleet-item-body"></div>`;
        groupBody.appendChild(div);
      });
      listEl.appendChild(groupDiv);
    });

    window.posCache=posCache;
    window.aircraftDataMap=Object.fromEntries(aircraftData.map(a=>[a.reg,a]));
    window._routeMap=routeMap;
    window._airportsByICAO=airportsByICAO;
    window._aircraftData=aircraftData;

    // Allow clicking live flights in airport panel to open aircraft panel
    window._openAcFromAirport=(reg)=>{
      const ac=window.aircraftDataMap[reg];
      const pos=window.posCache[reg];
      const jsDow=new Date().getUTCDay();
      const sheetDow=jsDow===0?6:jsDow-1;
      const routeNum=ac.routeNums[sheetDow];
      const route=routeNum?routeMap[routeNum]:null;
      if(ac&&pos&&route) openAircraftPanel(ac,pos,route,routeMap,airportsByICAO);
    };

    setInterval(()=>{
      const now=new Date();
      Object.values(planeMarkers).forEach(({marker,ac,route})=>{
        if(!route) return;
        const hubAp=airportsByICAO[ac.homeBase];
        if(!hubAp) return;
        const pos=computePosition(ac,route,airportsByICAO,now);
        posCache[ac.reg]=pos;
        if(pos.status==='airborne'){
          marker.setLatLng([pos.lat,pos.lon]);
          marker.setIcon(planeIcon(pos.heading));
        } else {
          map.removeLayer(marker);
        }
      });
    },30000);

    document.getElementById('loading').style.display='none';
    console.log('Done');
  }catch(err){
    console.error('INIT ERROR:',err);
    document.getElementById('loading-msg').textContent='Error: '+err.message;
  }
}

init();
</script>
